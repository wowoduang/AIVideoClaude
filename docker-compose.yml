services:
  narratoai-webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: videoai:latest
    container_name: videoai-webui
    ports:
      - "8366:8366"
    volumes:
      - ./storage:/NarratoAI/storage
      - ./config.toml:/NarratoAI/config.toml
      - ./resource:/NarratoAI/resource:rw
      - ./app/models:/NarratoAI/app/models:rw
      
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    restart: unless-stopped

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8866/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
